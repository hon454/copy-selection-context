name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew
      
      - name: Build plugin
        run: |
          ./gradlew buildPlugin --stacktrace --console=plain 2>&1 | tee build-output.log

      - name: Report task outcomes
        if: always()
        run: |
          echo "=== Gradle Task Outcomes ==="
          TASKS=$(grep "^> Task" build-output.log 2>/dev/null || echo "NO_TASK_OUTPUT")
          echo "$TASKS"
          
          # Report as annotations (visible via API)
          SKIPPED=$(echo "$TASKS" | grep -c "SKIPPED\|NO-SOURCE\|UP-TO-DATE" || true)
          EXECUTED=$(echo "$TASKS" | grep -cv "SKIPPED\|NO-SOURCE\|UP-TO-DATE\|NO_TASK_OUTPUT" || true)
          FAILED=$(echo "$TASKS" | grep -c "FAILED" || true)
          echo "::warning::TASK_SUMMARY: executed=$EXECUTED skipped=$SKIPPED failed=$FAILED"
          
          # Report specific task outcomes as individual annotations
          echo "$TASKS" | grep -i "buildPlugin\|prepareSandbox\|composedJar\|instrumentedJar\|compileKotlin\|jar\b\|patchPluginXml" | while IFS= read -r line; do
            echo "::warning::$line"
          done
          
          # Build directory contents
          echo ""
          echo "=== build/ directory tree ==="
          find build/ -type f 2>/dev/null | head -50 || echo "::error::build/ directory does NOT exist"
          echo ""
          echo "=== build/distributions/ ==="
          ls -la build/distributions/ 2>/dev/null || echo "::error::build/distributions/ does NOT exist"
          echo ""
          echo "=== build/libs/ ==="
          ls -la build/libs/ 2>/dev/null || echo "::warning::build/libs/ does NOT exist"

      - name: Verify plugin ZIP exists
        run: |
          if [ ! -d "build/distributions" ] || [ -z "$(find build/distributions/ -name '*.zip' 2>/dev/null)" ]; then
            echo "::error::No plugin ZIP found in build/distributions/"
            exit 1
          fi
          echo "Plugin ZIP found:"
          ls -la build/distributions/*.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-artifact
          path: build/distributions/*.zip
          if-no-files-found: error
          retention-days: 30
