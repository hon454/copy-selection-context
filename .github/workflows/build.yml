name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew
      
      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Diagnose build output
        if: always()
        run: |
          echo "=== All ZIP/JAR files in build/ ==="
          find build/ -type f \( -name "*.zip" -o -name "*.jar" \) 2>/dev/null || echo "No ZIP/JAR files found in build/"
          echo ""
          echo "=== build/distributions/ ==="
          ls -la build/distributions/ 2>/dev/null || echo "build/distributions/ does NOT exist"
          echo ""
          echo "=== build/libs/ ==="
          ls -la build/libs/ 2>/dev/null || echo "build/libs/ does NOT exist"

      - name: Verify plugin ZIP exists
        run: |
          if [ ! -d "build/distributions" ] || [ -z "$(find build/distributions/ -name '*.zip' 2>/dev/null)" ]; then
            echo "::error::No plugin ZIP found in build/distributions/"
            exit 1
          fi
          echo "Plugin ZIP found:"
          ls -la build/distributions/*.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-artifact
          path: build/distributions/*.zip
          if-no-files-found: error
          retention-days: 30
