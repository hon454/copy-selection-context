name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew
      
      - name: Build plugin
        run: |
          ./gradlew buildPlugin --stacktrace --console=plain 2>&1 | tee build-output.log

      - name: Report task outcomes
        if: always()
        run: |
          LOGFILE="build-output.log"
          TOTAL_LINES=$(wc -l < "$LOGFILE" 2>/dev/null || echo "0")
          echo "::warning::LOG_LINES: $TOTAL_LINES total lines in build output"
          
          # Show first 3 lines
          echo "::warning::HEAD: $(head -3 "$LOGFILE" 2>/dev/null | tr '\n' ' || ')"
          
          # Show last 10 lines (most important — shows BUILD result)
          echo "::warning::TAIL: $(tail -10 "$LOGFILE" 2>/dev/null | tr '\n' ' || ')"
          
          # Find any error/exception lines
          ERRORS=$(grep -i "error\|exception\|fail\|cannot\|could not" "$LOGFILE" 2>/dev/null | head -5 | tr '\n' ' || ' || echo "NONE")
          echo "::warning::ERRORS: $ERRORS"
          
          # Task lines (Gradle format: "> Task :name STATUS")
          TASKS=$(grep "^> Task" "$LOGFILE" 2>/dev/null | tr '\n' ' || ' || echo "NO_TASK_LINES")
          echo "::warning::TASKS: $TASKS"
          
          # Build directory
          BUILD_FILES=$(find build/ -type f 2>/dev/null | head -20 | tr '\n' ' || ' || echo "NO_BUILD_DIR")
          echo "::warning::BUILD_DIR: $BUILD_FILES"

      - name: Verify plugin ZIP exists
        run: |
          if [ ! -d "build/distributions" ] || [ -z "$(find build/distributions/ -name '*.zip' 2>/dev/null)" ]; then
            echo "::error::No plugin ZIP found in build/distributions/"
            exit 1
          fi
          echo "Plugin ZIP found:"
          ls -la build/distributions/*.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-artifact
          path: build/distributions/*.zip
          if-no-files-found: error
          retention-days: 30
