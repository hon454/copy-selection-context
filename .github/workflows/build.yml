name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew
      
      - name: Build plugin
        run: ./gradlew buildPlugin --stacktrace

      - name: Diagnose build output
        if: always()
        run: |
          REPORT="build-diagnostics.txt"
          {
            echo "=== Build Diagnostics ==="
            echo "Date: $(date -u)"
            echo ""
            echo "=== build/ directory tree (first 100 files) ==="
            find build/ -type f 2>/dev/null | head -100 || echo "build/ does NOT exist"
            echo ""
            echo "=== All ZIP files in build/ ==="
            find build/ -type f -name "*.zip" 2>/dev/null || echo "No ZIP files"
            echo ""
            echo "=== All JAR files in build/ ==="
            find build/ -type f -name "*.jar" 2>/dev/null || echo "No JAR files"
            echo ""
            echo "=== build/distributions/ ==="
            ls -la build/distributions/ 2>/dev/null || echo "build/distributions/ does NOT exist"
            echo ""
            echo "=== build/libs/ ==="
            ls -la build/libs/ 2>/dev/null || echo "build/libs/ does NOT exist"
            echo ""
            echo "=== Disk space ==="
            df -h .
          } | tee "$REPORT"
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build-diagnostics.txt
          if-no-files-found: warn

      - name: Verify plugin ZIP exists
        run: |
          if [ ! -d "build/distributions" ] || [ -z "$(find build/distributions/ -name '*.zip' 2>/dev/null)" ]; then
            echo "::error::No plugin ZIP found in build/distributions/"
            exit 1
          fi
          echo "Plugin ZIP found:"
          ls -la build/distributions/*.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-artifact
          path: build/distributions/*.zip
          if-no-files-found: error
          retention-days: 30
