name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify version matches build.gradle.kts
        run: |
          GRADLE_VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle.kts)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$GRADLE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: tag=$TAG_VERSION, build.gradle.kts=$GRADLE_VERSION"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Generate release notes from commits
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          REPO_URL="https://github.com/${{ github.repository }}"

          # Find previous tag; if none exists, use initial commit
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)
          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          fi

          # Generate commit list with linked short hashes
          git log "$RANGE" --pretty=format:"- [%h](${REPO_URL}/commit/%H) %s" --no-merges > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "Release $CURRENT_TAG" > release-notes.md
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build plugin
        run: ./gradlew --no-daemon buildPlugin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: build/distributions/*.zip
          draft: false
          prerelease: false

      - name: Publish to JetBrains Marketplace
        if: >-
          env.PUBLISH_TOKEN != '' &&
          env.CERTIFICATE_CHAIN != '' &&
          env.PRIVATE_KEY != ''
        run: ./gradlew --no-daemon publishPlugin
