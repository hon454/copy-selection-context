name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify version matches build.gradle.kts
        run: |
          GRADLE_VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle.kts)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$GRADLE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: tag=$TAG_VERSION, build.gradle.kts=$GRADLE_VERSION"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Generate release notes from changelog
        run: |
          ./gradlew getChangelog \
            --console=plain \
            -q \
            --no-header \
            --no-links \
            --no-summary > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "Release ${{ steps.version.outputs.tag }}" > release-notes.md
          fi

      - name: Build plugin
        run: ./gradlew buildPlugin --stacktrace

      - name: Verify plugin ZIP exists
        run: |
          if [ ! -d "build/distributions" ] || [ -z "$(find build/distributions/ -name '*.zip' 2>/dev/null)" ]; then
            echo "::error::No plugin ZIP found in build/distributions/"
            exit 1
          fi
          echo "Plugin ZIP found:"
          ls -la build/distributions/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: build/distributions/*.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

      - name: Publish to JetBrains Marketplace
        if: >-
          env.PUBLISH_TOKEN != '' &&
          env.CERTIFICATE_CHAIN != '' &&
          env.PRIVATE_KEY != ''
        run: ./gradlew publishPlugin
