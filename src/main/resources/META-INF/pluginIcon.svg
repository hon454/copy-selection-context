<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Light background -->
  <rect width="40" height="40" fill="#F5F5F5" rx="4"/>
  
  <!-- Clipboard/document body -->
  <rect x="11" y="8" width="18" height="22" fill="none" stroke="#2C3E50" stroke-width="1.5" rx="1"/>
  
  <!-- Clipboard clip -->
  <rect x="16" y="5" width="8" height="4" fill="#2C3E50" rx="0.5"/>
  
  <!-- Code lines (representing copied content) -->
  <line x1="14" y1="14" x2="26" y2="14" stroke="#34495E" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="18" x2="24" y2="18" stroke="#34495E" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="22" x2="26" y2="22" stroke="#34495E" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="26" x2="22" y2="26" stroke="#34495E" stroke-width="1.2" stroke-linecap="round"/>
</svg>